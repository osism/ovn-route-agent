name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o ovn-network-agent-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Build .deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed 's|/usr/local/bin/|/usr/bin/|' ovn-network-agent.service > ovn-network-agent.service.pkg
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          GOARCH=${{ matrix.goarch }} VERSION="${VERSION}" nfpm package --packager deb --target .

      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ovn-network-agent-${{ matrix.goos }}-${{ matrix.goarch }}
            ovn-network-agent_*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: artifacts/sbom.cyclonedx.json

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum ovn-network-agent-linux-* ovn-network-agent_*.deb sbom.cyclonedx.json > checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/ovn-network-agent-linux-*
            artifacts/ovn-network-agent_*.deb

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with cosign
        working-directory: artifacts
        run: |
          for file in ovn-network-agent-linux-* ovn-network-agent_*.deb sbom.cyclonedx.json checksums.txt; do
            cosign sign-blob --yes --bundle="${file}.bundle" "${file}"
          done

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            artifacts/ovn-network-agent-linux-amd64
            artifacts/ovn-network-agent-linux-arm64
            artifacts/ovn-network-agent_*.deb
            artifacts/sbom.cyclonedx.json
            artifacts/checksums.txt
            artifacts/*.bundle
