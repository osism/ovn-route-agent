name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o ovn-route-agent-${{ matrix.goos }}-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v6
        with:
          name: ovn-route-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ovn-route-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum ovn-route-agent-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ovn-route-agent-*
            artifacts/checksums.txt
